<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Telefonica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="topo">
            <h1>Agenda Telefonica</h1>
            <p>CRUD conectado ao Java Spring Boot e PostgreSQL.</p>
        </section>

        <section class="area-agenda">
            <form id="formContato" class="formulario">
                <input type="hidden" id="contatoId">

                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Ex: Ana Silva">

                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" placeholder="Ex: 11999991111" maxlength="11">

                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Ex: nome@email.com">

                <div class="botoes-form">
                    <button type="submit" id="botaoSalvar">Cadastrar</button>
                    <button type="button" id="botaoCancelar" class="secundario">Limpar</button>
                </div>
            </form>

            <section class="lista">
                <div class="lista-topo">
                    <h2>Contatos</h2>
                    <button type="button" id="botaoListar" class="secundario">Listar todos</button>
                </div>

                <div class="busca">
                    <input type="text" id="campoBusca" placeholder="Buscar pelo nome">
                    <button type="button" id="botaoBuscar">Buscar</button>
                </div>

                <div id="mensagem" class="mensagem"></div>
                <div id="listaContatos"></div>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
